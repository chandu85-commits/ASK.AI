<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ask.ai</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#0a0a0f; --sidebar:#0d0d14; --surface:#111118; --surface2:#1a1a24;
  --border:#2a2a38; --accent:#7c6aff; --accent2:#ff6a9b; --accent3:#6affda;
  --text:#e8e8f0; --text-muted:#7a7a95; --user-bubble:#1e1e30; --ai-bubble:#131320;
  --danger:#ff5566; --sw:268px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;font-weight:300;height:100vh;display:flex;overflow:hidden}

/* SIDEBAR */
#sidebar{width:var(--sw);background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;z-index:20;transition:width 0.28s ease,opacity 0.28s ease}
#sidebar.closed{width:0;opacity:0;overflow:hidden;pointer-events:none}
.sb-header{padding:17px 14px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px}
.logo{display:flex;align-items:center;gap:9px;flex:1;min-width:0}
.logo-icon{width:30px;height:30px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;animation:pglow 3s ease-in-out infinite}
@keyframes pglow{0%,100%{box-shadow:0 0 14px rgba(124,106,255,.35)}50%{box-shadow:0 0 26px rgba(124,106,255,.65),0 0 50px rgba(255,106,155,.15)}}
.logo-name{font-family:'DM Serif Display',serif;font-size:19px;letter-spacing:-.4px;background:linear-gradient(90deg,var(--text),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap}
.logo-name span{background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ib{width:28px;height:28px;background:transparent;border:1px solid var(--border);border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);transition:all .18s;flex-shrink:0}
.ib:hover{background:var(--surface2);color:var(--text);border-color:var(--accent)}
.ib svg{width:13px;height:13px}
.new-btn{margin:11px 10px 7px;padding:9px 13px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:9px;color:#fff;font-family:'DM Mono',monospace;font-size:11.5px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:all .2s;box-shadow:0 2px 14px rgba(124,106,255,.28)}
.new-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(124,106,255,.5)}
.new-btn svg{width:12px;height:12px}
.sl{padding:9px 14px 5px;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--text-muted);white-space:nowrap}
.chat-list{flex:1;overflow-y:auto;padding:0 7px}
.chat-list::-webkit-scrollbar{width:3px}
.chat-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.ci{display:flex;align-items:center;gap:7px;padding:8px 9px;border-radius:8px;cursor:pointer;transition:background .14s;position:relative;border:1px solid transparent}
.ci:hover{background:var(--surface2)}
.ci.active{background:rgba(124,106,255,.1);border-color:rgba(124,106,255,.2)}
.ci-icon{font-size:12px;flex-shrink:0;opacity:.65}
.ci-info{flex:1;min-width:0}
.ci-title{font-size:11.5px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.35}
.ci.active .ci-title{color:var(--accent)}
.ci-meta{font-size:9.5px;color:var(--text-muted);margin-top:1px}
.ci-acts{display:none;gap:2px;flex-shrink:0}
.ci:hover .ci-acts{display:flex}
.ca{width:21px;height:21px;background:transparent;border:none;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);transition:all .14s}
.ca:hover{background:var(--surface);color:var(--text)}
.ca.del:hover{color:var(--danger)}
.ca svg{width:11px;height:11px}
.sb-footer{padding:10px 7px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:1px}
.sfb{display:flex;align-items:center;gap:8px;padding:8px 9px;border-radius:7px;background:transparent;border:none;cursor:pointer;color:var(--text-muted);font-family:'DM Mono',monospace;font-size:10.5px;transition:all .14s;text-align:left;white-space:nowrap}
.sfb:hover{background:var(--surface2);color:var(--text)}
.sfb svg{width:12px;height:12px;flex-shrink:0}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative}
body::before{content:'';position:fixed;top:-30%;left:-10%;width:55%;height:55%;background:radial-gradient(ellipse,rgba(124,106,255,.07) 0%,transparent 70%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;bottom:-30%;right:-10%;width:55%;height:55%;background:radial-gradient(ellipse,rgba(255,106,155,.05) 0%,transparent 70%);pointer-events:none;z-index:0}

/* TOPBAR */
#topbar{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;border-bottom:1px solid var(--border);background:rgba(10,10,15,.88);backdrop-filter:blur(20px);z-index:10;gap:10px}
.tb-l{display:flex;align-items:center;gap:9px;min-width:0}
.tb-title{font-size:12.5px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:280px}
.tb-title.ph{color:var(--text-muted);font-style:italic}
.tb-r{display:flex;align-items:center;gap:7px;flex-shrink:0}
.status{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--text-muted)}
.sdot{width:6px;height:6px;background:var(--accent3);border-radius:50%;animation:blink 2s ease-in-out infinite;box-shadow:0 0 5px var(--accent3)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.badge{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);padding:3px 8px;border:1px solid var(--border);border-radius:18px}

/* CHAT */
#chat{flex:1;overflow-y:auto;padding:22px 0;position:relative;z-index:1;scroll-behavior:smooth}
#chat::-webkit-scrollbar{width:4px}
#chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.chat-inner{max-width:740px;margin:0 auto;padding:0 22px;display:flex;flex-direction:column;gap:17px}

/* WELCOME */
.welcome{text-align:center;padding:48px 20px 28px;animation:fu .7s ease both}
@keyframes fu{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.wt{font-family:'DM Serif Display',serif;font-size:clamp(30px,5vw,48px);line-height:1.1;margin-bottom:11px;background:linear-gradient(135deg,var(--text) 30%,var(--accent) 70%,var(--accent2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ws{font-size:11.5px;color:var(--text-muted);letter-spacing:.05em;margin-bottom:28px}
.starters{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;max-width:490px;margin:0 auto}
.starter{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 13px;text-align:left;cursor:pointer;transition:all .2s;font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);line-height:1.5}
.starter:hover{border-color:var(--accent);background:var(--surface2);color:var(--text);transform:translateY(-2px);box-shadow:0 4px 16px rgba(124,106,255,.13)}
.si{font-size:15px;display:block;margin-bottom:4px}

/* MESSAGES */
.msg{display:flex;gap:11px;animation:fu .33s ease both}
.msg.user{flex-direction:row-reverse}
.av{width:29px;height:29px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;margin-top:2px}
.av.ai{background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 0 10px rgba(124,106,255,.28)}
.av.u{background:var(--surface2);border:1px solid var(--border);font-size:9.5px;color:var(--text-muted)}
.bubble{max-width:82%;padding:12px 16px;border-radius:14px;font-size:12.5px;line-height:1.75;letter-spacing:.01em}
.msg.ai .bubble{background:var(--ai-bubble);border:1px solid var(--border);border-top-left-radius:3px}
.msg.user .bubble{background:var(--user-bubble);border:1px solid rgba(124,106,255,.22);border-top-right-radius:3px}
.bl{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:5px}
.msg.ai .bl{color:var(--accent)}
.ti{display:flex;align-items:center;gap:5px;padding:12px 16px;background:var(--ai-bubble);border:1px solid var(--border);border-top-left-radius:3px;border-radius:14px;width:fit-content}
.td{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:tb 1.2s ease-in-out infinite}
.td:nth-child(2){animation-delay:.2s;background:var(--accent2)}
.td:nth-child(3){animation-delay:.4s;background:var(--accent3)}
@keyframes tb{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-5px);opacity:1}}
.bubble p{margin-bottom:6px}.bubble p:last-child{margin-bottom:0}
.bubble code{background:rgba(124,106,255,.13);border:1px solid rgba(124,106,255,.2);border-radius:4px;padding:1px 5px;font-size:11px;color:var(--accent3)}
.bubble pre{background:#0d0d18;border:1px solid var(--border);border-radius:8px;padding:12px;overflow-x:auto;margin:8px 0;font-size:11px;line-height:1.6;color:var(--accent3)}
.bubble strong{color:#fff;font-weight:500}
.bubble ul,.bubble ol{padding-left:15px;margin:4px 0}
.bubble li{margin-bottom:3px}

/* INPUT */
.ia{position:relative;z-index:10;padding:13px 18px 16px;border-top:1px solid var(--border);background:rgba(10,10,15,.9);backdrop-filter:blur(20px)}
.iw{max-width:740px;margin:0 auto;display:flex;align-items:flex-end;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:8px 8px 8px 15px;transition:border-color .2s,box-shadow .2s}
.iw:focus-within{border-color:rgba(124,106,255,.45);box-shadow:0 0 0 3px rgba(124,106,255,.07)}
#ui{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:'DM Mono',monospace;font-size:12.5px;font-weight:300;resize:none;max-height:140px;line-height:1.6;padding:3px 0}
#ui::placeholder{color:var(--text-muted)}
#sb2{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;color:#fff}
#sb2:hover:not(:disabled){transform:scale(1.07);box-shadow:0 4px 14px rgba(124,106,255,.44)}
#sb2:disabled{opacity:.4;cursor:not-allowed}
.fn{text-align:center;font-size:9px;color:var(--text-muted);margin-top:7px;letter-spacing:.05em}

/* MODAL */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(7px);z-index:100;align-items:center;justify-content:center}
.mo.open{display:flex}
.md{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:min(700px,94vw);max-height:83vh;display:flex;flex-direction:column;overflow:hidden;animation:fu .28s ease both}
.mh{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.mt{font-size:13.5px;color:var(--text)}
.mt span{color:var(--accent)}
.mb{flex:1;overflow-y:auto;padding:18px 20px}
.mb::-webkit-scrollbar{width:4px}
.mb::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.am{margin-bottom:14px}
.ar{font-size:9px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.ar.ai-r{color:var(--accent)}
.ar.u-r{color:var(--text-muted)}
.at{background:var(--ai-bubble);border:1px solid var(--border);border-radius:9px;padding:11px 14px;font-size:12px;line-height:1.7;color:var(--text)}
.at.ut{background:var(--user-bubble);border-color:rgba(124,106,255,.2)}
.er{display:flex;gap:7px;padding:13px 20px;border-top:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.eb{padding:7px 15px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;cursor:pointer;color:var(--text-muted);font-family:'DM Mono',monospace;font-size:10.5px;display:flex;align-items:center;gap:6px;transition:all .17s}
.eb:hover{border-color:var(--accent);color:var(--text);background:rgba(124,106,255,.08)}
.eb svg{width:11px;height:11px}

/* TOAST */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:9px 16px;font-size:11.5px;color:var(--text);opacity:0;transition:all .28s;z-index:200;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:620px){
  #sidebar{position:absolute;height:100%}
  .starters{grid-template-columns:1fr}
  .bubble{max-width:91%}
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="sb-header">
    <div class="logo">
      <div class="logo-icon">✦</div>
      <div class="logo-name">ask<span>.ai</span></div>
    </div>
    <button class="ib" onclick="toggleSidebar()" title="Collapse">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
  </div>

  <button class="new-btn" onclick="newChat()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    New Chat
  </button>

  <div class="sl">Recent Chats</div>
  <div class="chat-list" id="chat-list"></div>

  <div class="sb-footer">
    <button class="sfb" onclick="exportAll()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export All History
    </button>
    <button class="sfb" onclick="clearAll()" style="color:var(--danger)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      Clear All Chats
    </button>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="topbar">
    <div class="tb-l">
      <button class="ib" id="tog-btn" onclick="toggleSidebar()" title="Open sidebar" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="tb-title ph" id="tb-title">New Conversation</div>
    </div>
    <div class="tb-r">
      <button class="ib" onclick="archiveCurrent()" title="Archive / export this chat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="4" width="20" height="5" rx="2"/><path d="M4 9v9a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9"/><path d="M10 13h4"/></svg>
      </button>
      <div class="status"><div class="sdot"></div>online</div>
      <div class="badge">powered by claude</div>
    </div>
  </div>

  <div id="chat">
    <div class="chat-inner" id="ci">
      <div class="welcome" id="welcome">
        <div class="wt">What would you<br/>like to <em>ask</em>?</div>
        <div class="ws">// intelligent answers · creative thinking · deep knowledge</div>
        <div class="starters">
          <button class="starter" onclick="qs(this)"><span class="si">💡</span>Explain quantum computing in simple terms</button>
          <button class="starter" onclick="qs(this)"><span class="si">✍️</span>Write a short poem about midnight rain</button>
          <button class="starter" onclick="qs(this)"><span class="si">🧮</span>Help me debug my Python code</button>
          <button class="starter" onclick="qs(this)"><span class="si">🌐</span>Summarize the history of the internet</button>
        </div>
      </div>
    </div>
  </div>

  <div class="ia">
    <div class="iw">
      <textarea id="ui" placeholder="Ask me anything…" rows="1"></textarea>
      <button id="sb2" onclick="send()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <div class="fn">ask.ai · always learning · always honest</div>
  </div>
</div>

<!-- MODAL -->
<div class="mo" id="mo" onclick="closeMo(event)">
  <div class="md" onclick="event.stopPropagation()">
    <div class="mh">
      <div class="mt" id="mo-title">Chat Archive</div>
      <button class="ib" onclick="closeMo()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="mb" id="mo-body"></div>
    <div class="er">
      <button class="eb" onclick="dlTXT()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        .txt
      </button>
      <button class="eb" onclick="dlJSON()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        .json
      </button>
      <button class="eb" onclick="dlHTML()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        .html
      </button>
      <button class="eb" onclick="cpClip()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let chats = JSON.parse(localStorage.getItem('askai_v2') || '[]');
let cid = null, loading = false, moData = null;
const inp = document.getElementById('ui');
const ci = document.getElementById('ci');
const sb = document.getElementById('sb2');

/* INIT */
function init() {
  renderList();
  if (chats.length) loadChat(chats[0].id);
  else freshUI();
}

/* SIDEBAR */
let sopen = true;
function toggleSidebar() {
  sopen = !sopen;
  document.getElementById('sidebar').classList.toggle('closed', !sopen);
  document.getElementById('tog-btn').style.display = sopen ? 'none' : 'flex';
}

/* RENDER LIST */
function renderList() {
  const el = document.getElementById('chat-list');
  el.innerHTML = '';
  if (!chats.length) {
    el.innerHTML = '<div style="padding:14px;font-size:11px;color:var(--text-muted);text-align:center">No chats yet</div>';
    return;
  }
  chats.forEach(c => {
    const d = document.createElement('div');
    d.className = 'ci' + (c.id === cid ? ' active' : '');
    d.innerHTML = `
      <div class="ci-icon">💬</div>
      <div class="ci-info">
        <div class="ci-title">${esc(c.title)}</div>
        <div class="ci-meta">${fdate(c.ts)} · ${c.msgs.length} msgs</div>
      </div>
      <div class="ci-acts">
        <button class="ca" onclick="event.stopPropagation();openMo('${c.id}')" title="Archive">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="4" width="20" height="5" rx="2"/><path d="M4 9v9a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9"/><path d="M10 13h4"/></svg>
        </button>
        <button class="ca del" onclick="event.stopPropagation();delChat('${c.id}')" title="Delete">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
        </button>
      </div>`;
    d.onclick = () => loadChat(c.id);
    el.appendChild(d);
  });
}

/* NEW CHAT */
function newChat() {
  cid = null;
  freshUI();
  renderList();
}

function freshUI() {
  ci.innerHTML = `
    <div class="welcome" id="welcome">
      <div class="wt">What would you<br/>like to <em>ask</em>?</div>
      <div class="ws">// intelligent answers · creative thinking · deep knowledge</div>
      <div class="starters">
        <button class="starter" onclick="qs(this)"><span class="si">💡</span>Explain quantum computing in simple terms</button>
        <button class="starter" onclick="qs(this)"><span class="si">✍️</span>Write a short poem about midnight rain</button>
        <button class="starter" onclick="qs(this)"><span class="si">🧮</span>Help me debug my Python code</button>
        <button class="starter" onclick="qs(this)"><span class="si">🌐</span>Summarize the history of the internet</button>
      </div>
    </div>`;
  setTitle('New Conversation', true);
}

/* LOAD CHAT */
function loadChat(id) {
  const c = chats.find(x => x.id === id);
  if (!c) return;
  cid = id;
  ci.innerHTML = '';
  c.msgs.forEach(m => addMsgUI(m.role, m.content, false));
  setTitle(c.title);
  renderList();
  stb();
}

/* DELETE */
function delChat(id) {
  if (!confirm('Delete this chat?')) return;
  chats = chats.filter(c => c.id !== id);
  if (cid === id) { cid = null; freshUI(); }
  save(); renderList(); toast('Chat deleted');
}

function clearAll() {
  if (!confirm('Delete ALL chats? Cannot be undone.')) return;
  chats = []; cid = null; save(); freshUI(); renderList(); toast('All chats cleared');
}

/* QUICK START */
function qs(btn) {
  inp.value = btn.textContent.trim().replace(/^\S+\s*/,'');
  send();
}

/* SEND */
async function send() {
  const txt = inp.value.trim();
  if (!txt || loading) return;

  if (!cid) {
    const id = 'c' + Date.now();
    const title = txt.slice(0,44) + (txt.length > 44 ? '…' : '');
    chats.unshift({ id, title, msgs:[], ts: Date.now() });
    cid = id;
    setTitle(title);
    const w = document.getElementById('welcome');
    if (w) { w.style.transition = 'opacity .28s'; w.style.opacity = '0'; setTimeout(()=>w.remove(), 280); }
    renderList();
  }

  loading = true; sb.disabled = true;
  inp.value = ''; inp.style.height = 'auto';

  const chat = chats.find(c => c.id === cid);
  chat.msgs.push({ role:'user', content:txt });
  save(); addMsgUI('user', txt); addTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514', max_tokens:1000,
        system:`You are ask.ai — a sharp, warm, and thoughtful AI assistant. You give clear, accurate, and genuinely helpful answers. You're not Claude; you're ask.ai. Be concise but never terse. Use a friendly, intelligent tone. Format responses with markdown when helpful.`,
        messages: chat.msgs.map(m => ({ role:m.role, content:m.content }))
      })
    });
    const data = await res.json();
    rmTyping();
    const reply = data.error ? `⚠️ ${data.error.message}` : data.content.map(b=>b.text||'').join('');
    chat.msgs.push({ role:'assistant', content:reply });
    save(); addMsgUI('assistant', reply);
    renderList();
  } catch(e) {
    rmTyping(); addMsgUI('assistant', `⚠️ Error: ${e.message}`);
  }

  loading = false; sb.disabled = false; inp.focus();
}

/* UI HELPERS */
function addMsgUI(role, text, anim=true) {
  const isAI = role === 'assistant';
  const d = document.createElement('div');
  d.className = `msg ${isAI?'ai':'user'}`;
  if (!anim) d.style.animation = 'none';
  const av = document.createElement('div');
  av.className = `av ${isAI?'ai':'u'}`;
  av.textContent = isAI ? '✦' : 'you';
  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.innerHTML = `<div class="bl">${isAI?'ask.ai':'you'}</div><div>${fmt(text)}</div>`;
  d.appendChild(av); d.appendChild(bub);
  ci.appendChild(d); stb();
}

function addTyping() {
  const d = document.createElement('div');
  d.className = 'msg ai'; d.id = 'typ';
  const av = document.createElement('div');
  av.className = 'av ai'; av.textContent = '✦';
  const ind = document.createElement('div');
  ind.className = 'ti';
  for(let i=0;i<3;i++){const x=document.createElement('div');x.className='td';ind.appendChild(x)}
  d.appendChild(av); d.appendChild(ind);
  ci.appendChild(d); stb();
}

function rmTyping() { const t=document.getElementById('typ'); if(t) t.remove(); }

function stb() { const c=document.getElementById('chat'); c.scrollTop=c.scrollHeight; }

function setTitle(t, ph=false) {
  const el = document.getElementById('tb-title');
  el.textContent = t; el.className = 'tb-title' + (ph?' ph':'');
}

function fmt(text) {
  text = text.replace(/```([\s\S]*?)```/g,'<pre><code>$1</code></pre>');
  text = text.replace(/`([^`]+)`/g,'<code>$1</code>');
  text = text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  text = text.replace(/\*(.*?)\*/g,'<em>$1</em>');
  const lines = text.split('\n');
  let r='', inPre=false;
  for(let l of lines) {
    if(l.startsWith('<pre>')) inPre=true;
    if(l.endsWith('</pre>')){inPre=false;r+=l+'\n';continue}
    if(inPre){r+=l+'\n'}
    else if(l.trim()===''){r+='</p><p>'}
    else{r+=l+' '}
  }
  return '<p>'+r.trim()+'</p>';
}

/* ARCHIVE MODAL */
function archiveCurrent() {
  if (!cid) { toast('No active chat to archive'); return; }
  openMo(cid);
}

function exportAll() {
  if (!chats.length) { toast('No chats to export'); return; }
  moData = { id:'all', title:'All Chats' };
  document.getElementById('mo-title').innerHTML = `Archive — <span>All Chats (${chats.length})</span>`;
  const body = document.getElementById('mo-body');
  body.innerHTML = '';
  chats.forEach(c => {
    const h = document.createElement('div');
    h.style.cssText = 'margin:16px 0 8px;padding-bottom:7px;border-bottom:1px solid var(--border);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent)';
    h.textContent = c.title;
    body.appendChild(h);
    renderMsgsIntoEl(c.msgs, body);
  });
  document.getElementById('mo').classList.add('open');
}

function openMo(id) {
  const c = chats.find(x => x.id === id);
  if (!c) return;
  moData = c;
  document.getElementById('mo-title').innerHTML = `Archive — <span>${esc(c.title)}</span>`;
  const body = document.getElementById('mo-body');
  body.innerHTML = '';
  if (!c.msgs.length) { body.innerHTML='<p style="color:var(--text-muted);font-size:12px">No messages yet.</p>'; }
  else renderMsgsIntoEl(c.msgs, body);
  document.getElementById('mo').classList.add('open');
}

function renderMsgsIntoEl(msgs, el) {
  msgs.forEach(m => {
    const isAI = m.role==='assistant';
    const w = document.createElement('div');
    w.className = 'am';
    w.innerHTML = `<div class="ar ${isAI?'ai-r':'u-r'}">${isAI?'✦ ask.ai':'◉ you'}</div>
      <div class="at ${isAI?'':'ut'}">${fmt(m.content)}</div>`;
    el.appendChild(w);
  });
}

function closeMo(e) {
  if (!e || e.target===document.getElementById('mo'))
    document.getElementById('mo').classList.remove('open');
}

/* EXPORT */
function dlTXT() {
  if (!moData) return;
  const isAll = moData.id==='all';
  let t = `ask.ai Chat Archive\nExported: ${new Date().toLocaleString()}\n${'─'.repeat(48)}\n\n`;
  (isAll ? chats : [moData]).forEach(c => {
    if(isAll) t+=`\n═══ ${c.title} ═══\n\n`;
    c.msgs.forEach(m => { t+=`[${m.role==='assistant'?'ask.ai':'You'}]\n${m.content}\n\n`; });
    if(isAll) t+='─'.repeat(40)+'\n';
  });
  dl(t, `ask-ai-${Date.now()}.txt`, 'text/plain');
  toast('Downloaded .txt ✓');
}

function dlJSON() {
  if (!moData) return;
  const payload = moData.id==='all' ? chats : moData;
  dl(JSON.stringify(payload,null,2), `ask-ai-${Date.now()}.json`, 'application/json');
  toast('Downloaded .json ✓');
}

function dlHTML() {
  if (!moData) return;
  let msgs='';
  (moData.id==='all' ? chats : [moData]).forEach(c => {
    msgs+=`<h2 style="font-family:Georgia,serif;color:#7c6aff;margin:28px 0 10px;font-size:16px">${esc(c.title)}</h2>`;
    c.msgs.forEach(m => {
      const ai=m.role==='assistant';
      msgs+=`<div style="margin:10px 0;padding:13px 16px;background:${ai?'#131320':'#1e1e30'};border:1px solid #2a2a38;border-radius:10px">
        <div style="font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:${ai?'#7c6aff':'#7a7a95'};margin-bottom:5px">${ai?'✦ ask.ai':'◉ You'}</div>
        <div style="font-size:12.5px;line-height:1.75;color:#e8e8f0;white-space:pre-wrap">${esc(m.content)}</div></div>`;
    });
  });
  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>ask.ai Archive</title></head>
<body style="background:#0a0a0f;color:#e8e8f0;font-family:'Courier New',monospace;max-width:780px;margin:0 auto;padding:40px 22px">
<h1 style="font-family:Georgia,serif;font-size:30px;margin-bottom:3px">ask<span style="color:#7c6aff">.ai</span></h1>
<p style="color:#7a7a95;font-size:11px;margin-bottom:28px">Archived: ${new Date().toLocaleString()}</p>${msgs}</body></html>`;
  dl(html, `ask-ai-${Date.now()}.html`, 'text/html');
  toast('Downloaded .html ✓');
}

function cpClip() {
  if (!moData) return;
  let t='';
  (moData.id==='all'?chats:[moData]).forEach(c=>{
    t+=`\n${c.title}\n${'─'.repeat(28)}\n`;
    c.msgs.forEach(m=>{t+=`\n[${m.role==='assistant'?'ask.ai':'You'}]: ${m.content}\n`});
  });
  navigator.clipboard.writeText(t.trim()).then(()=>toast('Copied to clipboard ✓'));
}

function dl(content, name, type) {
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content],{type}));
  a.download=name; a.click();
}

/* UTILS */
function save(){localStorage.setItem('askai_v2',JSON.stringify(chats))}
function fdate(ts){const d=new Date(ts),n=new Date();return d.toDateString()===n.toDateString()?d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):d.toLocaleDateString([],{month:'short',day:'numeric'})}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200)}

/* INPUT EVENTS */
inp.addEventListener('input',()=>{inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,140)+'px'});
inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}});

init();
</script>
</body>
</html>
